name: release-plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Don't race overlapping runs on quick successive pushes.
concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # PAT, not the default GITHUB_TOKEN — a tag pushed by GITHUB_TOKEN does
          # not trigger the dist release workflow.
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
